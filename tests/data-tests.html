<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>FinTrack Data Tests</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #f5f6fa; }
    pre  { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 16px; }
    .pass { color: #16a34a; } .fail { color: #ef4444; font-weight: bold; }
  </style>
</head>
<body>
<h2>FinTrack Data Layer Tests</h2>
<pre id="output">Running...</pre>
<script>
// ── In-memory cache (mirrors supabase-layer _db) ──────────────────────────────
const _db = {
  incomeLog:     [],
  expenseLog:    [],
  installments:  [],
  fixedExpenses: [],
  settings:      null,
};

function resetDb(overrides = {}) {
  _db.incomeLog     = overrides.incomeLog     || [];
  _db.expenseLog    = overrides.expenseLog    || [];
  _db.installments  = overrides.installments  || JSON.parse(JSON.stringify(SEED_INSTALLMENTS));
  _db.fixedExpenses = overrides.fixedExpenses || JSON.parse(JSON.stringify(SEED_FIXED_EXPENSES));
  _db.settings      = overrides.settings      !== undefined ? overrides.settings : null;
}

const KEYS = {
  INCOME_LOG:     'fintrack_income_log',
  EXPENSE_LOG:    'fintrack_expense_log',
  INSTALLMENTS:   'fintrack_installments',
  FIXED_EXPENSES: 'fintrack_fixed_expenses',
  SETTINGS:       'fintrack_settings',
};

const SEED_INSTALLMENTS = [
  { id:'i1', name:'Cash Loan 1',  card:'UOB',   monthly:1968, paid:6,  total:11 },
  { id:'i2', name:'Cash Loan 2',  card:'UOB',   monthly:2236, paid:1,  total:11 },
  { id:'i3', name:'Cash Loan 3',  card:'UOB',   monthly:2236, paid:1,  total:11 },
  { id:'i4', name:'Deepcharts',   card:'KTC',   monthly:1072, paid:5,  total:10 },
  { id:'i5', name:'Fabervaale',   card:'KTC',   monthly:3419, paid:4,  total:10 },
  { id:'i6', name:'ATAS',         card:'KBANK', monthly:757,  paid:1,  total:10 },
  { id:'i7', name:'Tradezella',   card:'KBANK', monthly:790,  paid:3,  total:10 },
  { id:'i8', name:'Tradingview',  card:'KBANK', monthly:825,  paid:6,  total:10 },
  { id:'i9', name:'Petheal',      card:'KBANK', monthly:970,  paid:9,  total:10 },
];

const SEED_FIXED_EXPENSES = [
  { id:'f1', name:'Maid Salary',      amount:7000, category:'household'    },
  { id:'f2', name:'Electricity',      amount:4000, category:'household'    },
  { id:'f3', name:'Water Bill',       amount:500,  category:'household'    },
  { id:'f4', name:'Phone Bill',       amount:749,  category:'household'    },
  { id:'f5', name:'Wifi Bill',        amount:749,  category:'household'    },
  { id:'f6', name:'YouTube Premium',  amount:519,  category:'subscription' },
  { id:'f7', name:'iCloud Storage',   amount:99,   category:'subscription' },
];

// ── Data layer (mirrors index.html data-layer, reads from _db) ────────────────
function getData(key) {
  switch (key) {
    case KEYS.INCOME_LOG:     return _db.incomeLog;
    case KEYS.EXPENSE_LOG:    return _db.expenseLog;
    case KEYS.INSTALLMENTS:   return _db.installments;
    case KEYS.FIXED_EXPENSES: return _db.fixedExpenses;
    default: return null;
  }
}
function getMonthKey(date = new Date()) {
  return date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0');
}
function todayISO() {
  return new Date().toISOString().split('T')[0];
}
function getIncomeLog(month = getMonthKey()) {
  return _db.incomeLog.filter(e => e.date.startsWith(month));
}
function getExpenseLog(month = getMonthKey()) {
  return _db.expenseLog.filter(e => e.date.startsWith(month));
}
function getSettings() {
  const s = _db.settings;
  if (!s) return { currency:'THB', monthStart:1, userName:'B' };
  return {
    currency:        s.currency    || 'THB',
    monthStart:      s.month_start || 1,
    userName:        s.username    || 'B',
    balanceOverride: s.balance_override != null ? s.balance_override : undefined,
  };
}
const SALARY = 30000;
function computeCashBalance(month = getMonthKey()) {
  const settings = getSettings();
  if (settings.balanceOverride != null) return settings.balanceOverride;
  const incomeTotal  = getIncomeLog(month).reduce((s, e) => s + e.amount, 0);
  const expenseTotal = getExpenseLog(month).reduce((s, e) => s + e.amount, 0);
  const fixedTotal   = _db.fixedExpenses.reduce((s, e) => s + e.amount, 0);
  const ccTotal      = _db.installments.reduce((s, p) => s + p.monthly, 0);
  return SALARY + incomeTotal - fixedTotal - ccTotal - expenseTotal;
}

// ── Test runner ───────────────────────────────────────────────────────────────
let passed = 0, failed = 0;
const lines = [];
function test(name, fn) {
  resetDb();
  try { fn(); passed++; lines.push('<span class="pass">OK ' + name + '</span>'); }
  catch(e) { failed++; lines.push('<span class="fail">FAIL ' + name + ': ' + e.message + '</span>'); }
}
function assert(cond, msg) { if (!cond) throw new Error(msg || 'assertion failed'); }

// ── Tests ─────────────────────────────────────────────────────────────────────

test('resetDb seeds 9 installments', () => {
  assert(_db.installments.length === 9, 'got ' + _db.installments.length);
});

test('resetDb seeds 7 fixed expenses', () => {
  assert(_db.fixedExpenses.length === 7, 'got ' + _db.fixedExpenses.length);
});

test('resetDb with override keeps custom installments', () => {
  resetDb({ installments: [{ id:'x', name:'custom', card:'UOB', monthly:999, paid:1, total:5 }] });
  assert(_db.installments.length === 1, 'got ' + _db.installments.length);
});

test('getMonthKey returns YYYY-MM', () => {
  assert(getMonthKey(new Date('2026-05-22')) === '2026-05', 'got ' + getMonthKey(new Date('2026-05-22')));
});

test('todayISO returns ISO date string', () => {
  assert(/^\d{4}-\d{2}-\d{2}$/.test(todayISO()), 'got ' + todayISO());
});

test('getData returns incomeLog from _db', () => {
  _db.incomeLog = [{ id:'a', source:'BIOPOX', amount:7500, date:'2026-05-18', note:'' }];
  const result = getData(KEYS.INCOME_LOG);
  assert(result.length === 1 && result[0].source === 'BIOPOX');
});

test('getIncomeLog filters by month', () => {
  _db.incomeLog = [
    { id:'a', source:'BIOPOX',  amount:7500,  date:'2026-05-18', note:'' },
    { id:'b', source:'Peptide', amount:12000, date:'2026-04-10', note:'' },
  ];
  const may = getIncomeLog('2026-05');
  assert(may.length === 1, 'expected 1, got ' + may.length);
  assert(may[0].source === 'BIOPOX');
});

test('getExpenseLog filters by month', () => {
  _db.expenseLog = [
    { id:'a', type:'Dining Out', amount:450, date:'2026-05-21', note:'' },
    { id:'b', type:'Shopping',   amount:999, date:'2026-04-01', note:'' },
  ];
  const may = getExpenseLog('2026-05');
  assert(may.length === 1, 'expected 1, got ' + may.length);
  assert(may[0].type === 'Dining Out');
});

test('getSettings returns defaults when _db.settings is null', () => {
  _db.settings = null;
  const s = getSettings();
  assert(s.currency === 'THB' && s.monthStart === 1 && s.userName === 'B');
  assert(s.balanceOverride === undefined, 'expected undefined');
});

test('getSettings normalises snake_case from Supabase', () => {
  _db.settings = { currency:'THB', month_start:1, username:'B', balance_override:null };
  const s = getSettings();
  assert(s.monthStart === 1, 'monthStart mapping failed');
  assert(s.userName === 'B', 'userName mapping failed');
  assert(s.balanceOverride === undefined, 'null override should map to undefined');
});

test('getSettings exposes balance_override as balanceOverride when set', () => {
  _db.settings = { currency:'THB', month_start:1, username:'B', balance_override:15000 };
  const s = getSettings();
  assert(s.balanceOverride === 15000, 'expected 15000, got ' + s.balanceOverride);
});

test('getSettings treats balance_override:0 as set (not falsy bypass)', () => {
  _db.settings = { currency:'THB', month_start:1, username:'B', balance_override:0 };
  const s = getSettings();
  assert(s.balanceOverride === 0, 'expected 0, got ' + s.balanceOverride);
});

test('computeCashBalance: salary + income - fixed - cc - expenses', () => {
  _db.incomeLog  = [{ id:'a', source:'BIOPOX', amount:7500, date:'2026-05-18', note:'' }];
  _db.expenseLog = [{ id:'b', type:'Dining Out', amount:450, date:'2026-05-21', note:'' }];
  const bal = computeCashBalance('2026-05');
  // salary 30000 + BIOPOX 7500 = 37500
  // fixed  7000+4000+500+749+749+519+99 = 13616
  // cc     1968+2236+2236+1072+3419+757+790+825+970 = 14273
  // misc   450
  // = 37500 - 13616 - 14273 - 450 = 9161
  assert(bal === 9161, 'expected 9161, got ' + bal);
});

test('computeCashBalance returns balanceOverride when set', () => {
  _db.settings = { currency:'THB', month_start:1, username:'B', balance_override:15000 };
  assert(computeCashBalance('2026-05') === 15000, 'expected 15000');
});

test('computeCashBalance ignores override when balance_override is null', () => {
  _db.settings = { currency:'THB', month_start:1, username:'B', balance_override:null };
  // no income or expenses — should be salary - fixed - cc
  const bal = computeCashBalance('2026-05');
  // 30000 - 13616 - 14273 = 2111
  assert(bal === 2111, 'expected 2111, got ' + bal);
});

// ── Results ───────────────────────────────────────────────────────────────────
lines.push('');
lines.push(passed + ' passed, ' + failed + ' failed');
document.getElementById('output').innerHTML = lines.join('\n');
</script>
</body>
</html>
